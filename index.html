<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Online Tools | Pro Calculator Hub</title>

<style>
body{margin:0;font-family:Arial;background:#0f1117;color:#fff}
.layout{display:flex}

/* SIDEBAR */
.sidebar{
width:240px;background:#111;height:100vh;padding:20px;position:fixed
}
.sidebar h2{color:#00c2a8;margin-bottom:15px}
.sidebar button{
display:block;width:100%;margin:6px 0;padding:10px;
background:none;border:none;color:#aaa;cursor:pointer;text-align:left;
border-radius:8px
}
.sidebar button:hover{background:#222;color:#00c2a8}

/* MAIN */
.main{margin-left:240px;width:100%}
.header{background:#111;padding:15px;text-align:center}

.content{max-width:900px;margin:auto;padding:20px}

/* CARDS */
.card{
background:#1a1b26;
padding:20px;
margin-bottom:20px;
border-radius:14px;
box-shadow:0 0 12px rgba(0,0,0,0.5);
}

h2{margin-top:0;color:#00c2a8}

input{
width:100%;
padding:10px;
margin:6px 0;
background:#111;
border:1px solid #333;
border-radius:8px;
color:#fff;
}

button.calc{
width:100%;
padding:12px;
margin-top:10px;
background:#00c2a8;
border:none;
border-radius:8px;
color:#fff;
font-weight:bold;
cursor:pointer;
}
button.calc:hover{background:#00e0c2}

.result{
margin-top:15px;
padding:10px;
background:#111;
border-radius:8px;
}

.ad{
background:#222;
padding:20px;
text-align:center;
border-radius:10px;
margin:20px 0;
}
</style>

</head>

<body>

<div class="layout">

<div class="sidebar">
<h2>Tools</h2>

<button onclick="show('home')">🏠 Home</button>
<button onclick="show('loan')">💰 Loan</button>
<button onclick="show('profit')">📈 Profit</button>
<button onclick="show('roi')">🎯 ROI</button>
<button onclick="show('bmi')">⚖️ BMI</button>
<button onclick="show('age')">🎂 Age</button>
<button onclick="show('tax')">🧾 Tax</button>

</div>

<div class="main">

<div class="header">
<h1>Free Online Tools</h1>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="card">
<h2>Welcome</h2>
<p>This platform provides advanced calculators for everyday use.</p>

<div class="ad">AdSense Space</div>
</div>

<!-- LOAN -->
<div id="loan" class="card" style="display:none">
<h2>Loan Calculator</h2>

<input id="loanAmount" type="number" placeholder="Loan Amount">
<input id="loanRate" type="number" placeholder="Interest %">
<input id="loanYears" type="number" placeholder="Years">

<button class="calc" onclick="calcLoan()">Calculate</button>
<div class="result" id="loanResult"></div>
</div>

<!-- PROFIT -->
<div id="profit" class="card" style="display:none">
<h2>Profit Calculator</h2>

<input id="cost" type="number" placeholder="Cost">
<input id="sell" type="number" placeholder="Selling Price">

<button class="calc" onclick="calcProfit()">Calculate</button>
<div class="result" id="profitResult"></div>
</div>

<!-- ROI -->
<div id="roi" class="card" style="display:none">
<h2>ROI Calculator</h2>

<input id="invest" type="number" placeholder="Investment">
<input id="returnVal" type="number" placeholder="Return">

<button class="calc" onclick="calcROI()">Calculate</button>
<div class="result" id="roiResult"></div>
</div>

<!-- BMI -->
<div id="bmi" class="card" style="display:none">
<h2>BMI Calculator</h2>

<input id="height" type="number" placeholder="Height (cm)">
<input id="weight" type="number" placeholder="Weight (kg)">

<button class="calc" onclick="calcBMI()">Calculate</button>
<div class="result" id="bmiResult"></div>
</div>

<!-- AGE -->
<div id="age" class="card" style="display:none">
<h2>Age Calculator</h2>

<input id="birthdate" type="date">

<button class="calc" onclick="calcAge()">Calculate</button>
<div class="result" id="ageResult"></div>
</div>

<!-- TAX -->
<div id="tax" class="card" style="display:none">
<h2>Tax Calculator</h2>

<input id="amount" type="number" placeholder="Amount">
<input id="taxRate" type="number" placeholder="Tax %">

<button class="calc" onclick="calcTax()">Calculate</button>
<div class="result" id="taxResult"></div>
</div>

</div>
</div>
</div>

<script>

// NAVIGATION
function show(id){
document.querySelectorAll('.card').forEach(el=>el.style.display='none')
document.getElementById(id).style.display='block'
}

// LOAN
function calcLoan(){
let P = parseFloat(loanAmount.value);
let r = parseFloat(loanRate.value)/100/12;
let n = parseFloat(loanYears.value)*12;

if(!P || !r || !n){
loanResult.innerHTML="Enter valid values";
return;
}

let m = P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
let total = m*n;

loanResult.innerHTML = `
Monthly Payment: ${m.toFixed(2)} <br>
Total Paid: ${total.toFixed(2)}
`;
}

// PROFIT
function calcProfit(){
let profit = sell.value - cost.value;
profitResult.innerHTML = "Profit: "+ profit;
}

// ROI
function calcROI(){
let roi = ((returnVal.value - invest.value)/invest.value)*100;
roiResult.innerHTML = "ROI: "+ roi.toFixed(2)+"%";
}

// BMI
function calcBMI(){
let h = height.value/100;
let bmi = weight.value/(h*h);
bmiResult.innerHTML = "BMI: "+ bmi.toFixed(1);
}

// AGE
function calcAge(){
let b = new Date(birthdate.value);
let now = new Date();
let age = now.getFullYear() - b.getFullYear();
ageResult.innerHTML = "Age: "+ age;
}

// TAX
function calcTax(){
let total = amount.value * (1 + taxRate.value/100);
taxResult.innerHTML = "Total: "+ total.toFixed(2);
}

</script>

</body>
</html>
